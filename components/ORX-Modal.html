<style>
    /* Overlay Gelap di belakang modal */
    .orx-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        z-index: 2000;
        display: none; /* Sembunyi secara default */
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    /* Struktur Modal yang muncul dari bawah */
    .orx-modal-sheet {
        position: fixed;
        bottom: -100%; /* Sembunyi di bawah skrin */
        left: 0;
        width: 100%;
        background: rgba(15, 15, 15, 0.9);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-top: 2px solid rgba(0, 210, 255, 0.3);
        border-radius: 30px 30px 0 0;
        padding: 30px 20px 50px 20px;
        z-index: 2001;
        transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
    }

    /* Penunjuk (Handlebar) di atas modal */
    .modal-handle {
        width: 40px;
        height: 5px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        margin: -15px auto 20px auto;
    }

    .modal-title {
        font-size: 1.2rem;
        font-weight: bold;
        color: #00d2ff;
        margin-bottom: 25px;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    /* Class untuk aktifkan modal */
    .orx-modal-active .orx-modal-overlay {
        display: block;
        opacity: 1;
    }

    .orx-modal-active .orx-modal-sheet {
        bottom: 0;
    }
</style>

<div id="registrationModal" class="">
    <div class="orx-modal-overlay" onclick="closeORXModal()"></div>
    <div class="orx-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Pendaftaran Baharu 🧠</div>
        
        <div class="orx-input-group">
            <input type="text" class="orx-field" required>
            <label class="orx-label">Nama Penuh</label>
        </div>

        <div class="orx-input-group">
            <input type="tel" class="orx-field" required>
            <label class="orx-label">No. Telefon</label>
        </div>

        <button class="btn-orx neon-blue" style="width: 100%; padding: 18px; border-radius: 15px; margin-top: 10px;">
            SAHKAN PENDAFTARAN
        </button>
    </div>
</div>

<script>
    function openORXModal() {
        document.getElementById('registrationModal').classList.add('orx-modal-active');
        // Trigger haptic bila modal dibuka
        if(typeof ORXHaptic !== 'undefined') ORXHaptic.success();
    }

    function closeORXModal() {
        document.getElementById('registrationModal').classList.remove('orx-modal-active');
    }
</script>
