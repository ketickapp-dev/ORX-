<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORX 🧠 GOD MOD</title>
    <link rel="stylesheet" href="assets/css/glassmorphism.css">
    <link rel="stylesheet" href="assets/css/neon-glow.css">
    <style>
        body {
            background: #050505; /* Lebih gelap untuk kontras neon */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Utama */
        .orx-container {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
            padding-bottom: 100px; /* Ruang untuk navbar bawah */
        }

        /* ORX-Card Style */
        .orx-card {
            margin-bottom: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .orx-card:active {
            transform: scale(0.98);
        }

        .card-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d2ff;
            margin-bottom: 10px;
            display: block;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* Navbar Bawah Style */
        .orx-nav-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 1000;
        }

        .orx-navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .nav-item {
            text-decoration: none;
            font-size: 1.3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
        }

        .nav-item.active {
            color: #00d2ff;
            text-shadow: 0 0 15px #00d2ff;
        }

        .nav-label {
            font-size: 0.6rem;
            margin-top: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="orx-container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 class="neon-text" style="font-size: 2.5rem; margin: 0;">ORX 🧠</h1>
            <p style="color: #666; font-size: 0.9rem;">Intelligence Engine v1.0</p>
        </header>

        <div class="orx-card orx-glass btn-orx">
            <span class="card-label">Status Semasa</span>
            <div class="card-value">24</div>
            <p style="color: #888; margin: 0;">Pelanggan menunggu dalam giliran</p>
        </div>

        <div class="orx-card orx-glass btn-orx" style="border-left: 4px solid #00d2ff;">
            <span class="card-label">Jualan Hari Ini</span>
            <div class="card-value">RM 1,240</div>
            <p style="color: #888; margin: 0;">Peningkatan 15% dari semalam</p>
        </div>

        <button class="btn-orx neon-blue" style="width: 100%; padding: 20px; border-radius: 20px; font-size: 1rem; margin-top: 10px;">
            DAFTAR PELANGGAN BARU
        </button>
    </div>

    <div class="orx-nav-container">
        <nav class="orx-navbar">
            <a href="#" class="nav-item active btn-orx">
                <span>🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a href="#" class="nav-item btn-orx">
                <span>📦</span>
                <span class="nav-label">Inventory</span>
            </a>
            <a href="#" class="nav-item btn-orx">
                <span>👥</span>
                <span class="nav-label">Users</span>
            </a>
            <a href="#" class="nav-item btn-orx">
                <span>⚙️</span>
                <span class="nav-label">Config</span>
            </a>
        </nav>
    </div>

    <script src="assets/js/haptic-engine.js"></script>
    <script src="assets/js/particle-fx.js"></script>
</body>
</html>
