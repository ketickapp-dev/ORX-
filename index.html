<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORX 🧠 GOD MOD v2.0</title>
    
    <link rel="stylesheet" href="assets/css/glassmorphism.css">
    <link rel="stylesheet" href="assets/css/neon-glow.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <style>
        body {
            /* Warna asas gelap pekat */
            background-color: #030303; 
            /* BACKROUND GRID KOSONG DIISI DI SINI 
              Guna linear-gradient untuk cipta grid halus.
            */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px; /* Saiz kotak grid */
            background-position: center;
            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Container & UI Components (Sama seperti v1.0, cuma tweak sikit padding) */
        .orx-container { width: 100%; max-width: 500px; margin-top: 30px; padding-bottom: 150px; }
        .orx-card { margin-bottom: 15px; padding: 20px; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .card-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #00d2ff; margin-bottom: 8px; display: block; opacity: 0.8; }
        .card-value { font-size: 2.2rem; font-weight: 700; margin: 5px 0; color: #fff; }
        
        /* Gaya Teks Header (Subtle) */
        .header-subtitle { color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; letter-spacing: 1px; margin-top: -5px; }

        /* Modal Styles (Sama, pekatkan sikit) */
        .orx-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .orx-modal-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #0a0a0a; border-top: 1px solid rgba(255, 255, 255, 0.05); border-radius: 25px 25px 0 0; padding: 25px 20px 40px 20px; z-index: 2001; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; }
        .orx-modal-active .orx-modal-overlay { display: block; opacity: 1; }
        .orx-modal-active .orx-modal-sheet { bottom: 0; }
        .modal-handle { width: 35px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin: -10px auto 20px auto; }

        /* Input Styles (Premium Dark) */
        .orx-input-group { position: relative; margin-bottom: 20px; width: 100%; }
        .orx-field { width: 100%; padding: 12px 0; font-size: 0.95rem; color: #fff; background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.1); outline: none; }
        .orx-label { position: absolute; top: 12px; left: 0; font-size: 0.95rem; color: rgba(255, 255, 255, 0.3); pointer-events: none; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        .orx-field:focus ~ .orx-label, .orx-field:valid ~ .orx-label { top: -12px; font-size: 0.65rem; color: #00d2ff; opacity: 1; }

        /* Navbar (Sama, pekatkan sikit) */
        .orx-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 380px; z-index: 1000; }
        .orx-navbar { display: flex; justify-content: space-around; padding: 10px; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .nav-item { text-decoration: none; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; color: rgba(255, 255, 255, 0.3); transition: all 0.3s; }
        .nav-item.active { color: #00d2ff; filter: drop-shadow(0 0 3px rgba(0, 210, 255, 0.5)); }
        .nav-label { font-size: 0.55rem; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Module Switcher Buttons (Sama) */
        .switcher-bar { margin-top: 30px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn-switch { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.5); padding:6px 12px; border-radius:10px; font-size:9px; cursor:pointer; transition: all 0.3s; text-transform: uppercase; }
        .btn-switch:hover { background: rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body class="orx-reveal">

    <div class="orx-container">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 class="neon-text orx-float" style="font-size: 2.2rem; margin: 0; transition: all 0.5s ease;">ORX 🧠</h1>
            <p class="header-subtitle">Intelligence Engine v2.0</p>
        </header>

        <div class="orx-card orx-glass btn-orx orx-pulse-blue" style="border-left: 3px solid rgba(0, 210, 255, 0.3);">
            <span class="card-label">Status Semasa</span>
            <div class="card-value">24</div>
            <p style="color: rgba(255,255,255,0.5); margin: 0; font-size: 0.8rem;">Pelanggan dalam giliran</p>
        </div>

        <div class="orx-card orx-glass btn-orx" style="border-left: 3px solid rgba(0, 210, 255, 0.3);">
            <span class="card-label">Jualan Hari Ini</span>
            <div class="card-value">RM 1,240</div>
            <p style="color: rgba(255,255,255,0.5); margin: 0; font-size: 0.8rem;">Peningkatan 15%</p>
        </div>

        <button id="mainActionBtn" class="btn-orx neon-blue" onclick="openORXModal()" style="width: 100%; padding: 18px; border-radius: 15px; font-size: 0.9rem; margin-top: 10px; transition: all 0.5s ease; text-transform: uppercase; letter-spacing: 1px;">
            DAFTAR PELANGGAN BARU
        </button>

        <div class="switcher-bar">
            <button class="btn-switch" onclick="switchORXModule('IT_STORE')" style="color:#00d2ff;">MOD IT</button>
            <button class="btn-switch" onclick="switchORXModule('CLINIC')" style="color:#00ff88;">MOD KLINIK</button>
            <button class="btn-switch" onclick="switchORXModule('RETAIL')" style="color:#ff0077;">MOD RETAIL</button>
        </div>
    </div>

    <div id="registrationModal">
        <div class="orx-modal-overlay" onclick="closeORXModal()"></div>
        <div class="orx-modal-sheet">
            <div class="modal-handle"></div>
            <h2 id="modalTitle" style="text-align:center; color:#fff; letter-spacing:1px; font-size:1rem; margin-bottom:25px; text-transform: uppercase;">ORX REGISTER</h2>
            
            <div class="orx-input-group">
                <input type="text" class="orx-field" required>
                <label class="orx-label">Nama Penuh</label>
            </div>
            <div class="orx-input-group">
                <input type="tel" class="orx-field" required>
                <label class="orx-label">No. Telefon</label>
            </div>

            <button id="modalActionBtn" class="btn-orx neon-blue" onclick="closeORXModal()" style="width: 100%; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                SAHKAN DATA 🧠
            </button>
        </div>
    </div>

    <div class="orx-nav-container">
        <nav class="orx-navbar">
            <a href="#" class="nav-item active btn-orx"><span>🏠</span><span class="nav-label">Home</span></a>
            <a href="#" class="nav-item btn-orx"><span>📦</span><span class="nav-label">Inventory</span></a>
            <a href="#" class="nav-item btn-orx"><span>👥</span><span class="nav-label">Users</span></a>
            <a href="#" class="nav-item btn-orx"><span>⚙️</span><span class="nav-label">Config</span></a>
        </nav>
    </div>

    <script>
        function openORXModal() {
            document.getElementById('registrationModal').classList.add('orx-modal-active');
            if(window.ORXHaptic) ORXHaptic.success();
        }
        function closeORXModal() {
            document.getElementById('registrationModal').classList.remove('orx-modal-active');
            if(window.ORXHaptic) ORXHaptic.light();
        }
    </script>
    <script src="assets/js/haptic-engine.js"></script>
    <script src="assets/js/particle-fx.js"></script>
    <script src="assets/js/module-switcher.js"></script>
</body>
</html>
